<div class="container-fluid d-flex align-items-center justify-content-center min-vh-100">
  <div class="row w-100">
    <div class="col-md-6 mx-auto">
      <div class="card shadow-lg border-0">
        <div class="card-body p-5 text-center">
          <!-- Error Icon -->
          <div class="mb-4">
            <i class="feather icon-lock" style="font-size: 80px; color: #dc3545;"></i>
          </div>

          <!-- Error Title -->
          <h1 class="mb-3" style="font-size: 48px; font-weight: 700; color: #dc3545;">
            403
          </h1>

          <!-- Error Message -->
          <h2 class="mb-3" style="font-size: 24px; font-weight: 600; color: #333;">
            Accès Refusé
          </h2>

          <p class="text-muted mb-4" style="font-size: 16px;">
            Vous n'avez pas les permissions nécessaires pour accéder à cette page.
          </p>

          <p class="text-muted mb-5" style="font-size: 14px;">
            Si vous pensez que c'est une erreur, veuillez contacter l'administrateur.
          </p>

          <!-- Action Buttons -->
          <div class="d-flex gap-3 justify-content-center">

            <button 
              class="btn btn-outline-primary px-4 py-2"
              (click)="goToLogin()"
              style="font-size: 14px; font-weight: 600;">
              <i class="feather icon-log-in me-2"></i>
              Se Connecter
            </button>
          </div>
        </div>
      </div>

      <!-- Additional Info -->
      <div class="text-center mt-4">
        <p class="text-muted" style="font-size: 12px;">
          Code d'erreur: 403 Forbidden
        </p>
      </div>
    </div>
  </div>
</div>
